services:
  mongo:
    image: mongo:7
    container_name: ticket-rush-mongo
    ports:
      - "27017:27017"
    # single node replica set
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try { rs.status() }
          catch (e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'localhost:27017'}]}) }
        "
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 5s

volumes:
  mongo-data:
